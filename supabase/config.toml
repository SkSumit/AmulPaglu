# Supabase project configuration
# Used for local development (supabase start) and CI.
# For deployed projects, secrets are set via the Dashboard → Edge Functions → Secrets.

project_id = "amulpaglu"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 6
password_requirements = ""

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# ── Edge Functions ────────────────────────────────────────────────────────────
# Deploy with:
#   supabase functions deploy scrape-products --project-ref <your-ref>
#
# Required secrets (set once via Dashboard or CLI):
#   supabase secrets set SUPABASE_SERVICE_ROLE_KEY=<key> --project-ref <your-ref>
#   (SUPABASE_URL is injected automatically by the runtime)

[functions.scrape-products]
verify_jwt = true
